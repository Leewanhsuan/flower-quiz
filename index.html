<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你是哪種花束？</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💐</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=LXGW+WenKai+TC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F2F0EC;
  --surface: #FAFAF8;
  --ink: #404E3B;
  --ink-light: #6C8480;
  --line: rgba(64,78,59,0.12);
  --sage: #7B9669;
  --sage-light: #BAC8B1;
  --grey: #E6E6E6;
  --grey-mid: #6C8480;

  /* accent per bouquet — kept subtle within the palette */
  --accent-rose:      #7B9669;
  --accent-sage:      #6C8480;
  --accent-gold:      #7B9669;
  --accent-lavender:  #6C8480;
  --accent-poppy:     #7B9669;
  --accent-herb:      #404E3B;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'LXGW WenKai TC', cursive;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}


/* ── botanical deco lines ── */
.deco-line {
  display: block; width: 1px;
  background: var(--line);
  position: fixed; top: 0; bottom: 0;
}
.deco-line.left { left: 48px; }
.deco-line.right { right: 48px; }

.app {
  max-width: 600px;
  margin: 0 auto;
  padding: 64px 24px 96px;
  position: relative; z-index: 1;
}

/* ── HEADER ── */
.header {
  text-align: center;
  margin-bottom: 56px;
  animation: fadeUp 1s ease both;
}
.header-eyebrow {
  font-size: 0.68rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 20px;
  display: flex; align-items: center; justify-content: center; gap: 16px;
}
.header-eyebrow::before, .header-eyebrow::after {
  content: ''; display: block; width: 32px; height: 1px; background: var(--ink-light); opacity: 0.4;
}
.header h1 {
  font-family: 'LXGW WenKai TC', 'Cormorant Garamond', cursive;
  font-size: clamp(2.6rem, 8vw, 4rem);
  font-weight: 300;
  line-height: 1.1;
  letter-spacing: -0.5px;
  margin-bottom: 16px;
  color: var(--ink);
}
.header h1 em {
  font-style: italic;
  font-weight: 400;
  color: var(--sage);
}
.header-sub {
  font-size: 0.88rem;
  color: var(--ink-light);
  line-height: 1.9;
  font-weight: 300;
  max-width: 340px;
  margin: 0 auto;
}

/* ── START CARD ── */
.start-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 48px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
  animation: fadeUp 1s 0.2s ease both;
}
/* corner marks */
.start-card::before, .start-card::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-color: rgba(100,88,75,0.25);
  border-style: solid;
}
.start-card::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
.start-card::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

.start-flower-icon {
  font-size: 3.6rem;
  display: block;
  margin-bottom: 24px;
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

.start-card h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 12px;
}
.start-card p {
  font-size: 0.86rem;
  color: var(--ink-light);
  line-height: 1.9;
  font-weight: 300;
  margin-bottom: 8px;
}
.quiz-meta {
  display: flex; justify-content: center; gap: 10px;
  margin: 24px 0; flex-wrap: wrap;
}
.meta-tag {
  border: 1px solid var(--line);
  padding: 5px 14px; border-radius: 99px;
  font-size: 0.73rem; color: var(--ink-light);
  letter-spacing: 0.5px;
}

/* ── BUTTONS ── */
.btn-primary {
  background: var(--ink);
  color: var(--bg);
  border: none;
  padding: 14px 44px;
  font-family: 'LXGW WenKai TC', cursive;
  font-size: 0.9rem;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s ease;
  border-radius: 2px;
}
.btn-primary:hover { background: #3a3026; transform: translateY(-1px); }

/* ── QUIZ ── */
#quiz-screen { display: none; }

.progress-wrap {
  margin-bottom: 36px;
  display: flex; align-items: center; gap: 14px;
}
.progress-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.82rem;
  color: var(--ink-light);
  letter-spacing: 1px;
  white-space: nowrap;
  min-width: 52px;
}
.progress-track {
  flex: 1; height: 1px;
  background: var(--line);
  position: relative;
}
.progress-fill {
  position: absolute; left: 0; top: 0; height: 100%;
  background: var(--sage);
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.progress-dot {
  position: absolute; top: 50%; transform: translateY(-50%);
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--sage);
  transition: left 0.6s cubic-bezier(0.4,0,0.2,1);
}

.question-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 40px;
  position: relative;
  overflow: hidden;
  animation: slideIn 0.45s ease both;
}
.question-card::before, .question-card::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-color: rgba(100,88,75,0.2);
  border-style: solid;
}
.question-card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
.question-card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }

@keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

.q-number {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.72rem;
  color: var(--ink-light);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 18px;
}
.q-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.45rem;
  font-weight: 400;
  line-height: 1.6;
  color: var(--ink);
  margin-bottom: 28px;
}

.options-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.opt-btn {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 14px 18px;
  text-align: left;
  cursor: pointer;
  font-family: 'LXGW WenKai TC', cursive;
  font-size: 0.85rem;
  color: var(--ink);
  line-height: 1.6;
  transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
  display: flex; align-items: flex-start; gap: 12px;
}
.opt-letter {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.78rem;
  letter-spacing: 1px;
  opacity: 0.45;
  flex-shrink: 0;
  margin-top: 1px;
}
@media (hover: hover) {
  .opt-btn:hover { background: var(--sage-light); border-color: var(--sage); }
}
.opt-btn.chosen { background: var(--sage); color: #fff; border-color: var(--sage); }
.opt-btn.chosen .opt-letter { opacity: 0.8; }
.opt-btn.disabled { pointer-events: none; opacity: 0.5; }

/* ── RESULT ── */
#result-screen { display: none; }

.result-reveal {
  animation: fadeUp 0.8s ease both;
}

.result-header {
  text-align: center;
  margin-bottom: 36px;
}
.result-eyebrow {
  font-size: 0.68rem;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 20px;
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
.result-eyebrow::before, .result-eyebrow::after {
  content: ''; display: block; width: 24px; height: 1px; background: currentColor; opacity: 0.4;
}

.result-flower-icon {
  display: block;
  margin: 0 auto 20px;
  animation: bloom 1s cubic-bezier(0.34,1.56,0.64,1) both;
}
.result-flower-icon img {
  width: 200px;
  height: 200px;
  object-fit: contain;
}
@keyframes bloom { from{transform:scale(0.4) rotate(-15deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }

.result-flower-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  font-weight: 300;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.1;
}
.result-flower-latin {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem;
  font-style: italic;
  color: var(--ink-light);
  margin-bottom: 6px;
}
.result-tagline {
  font-size: 0.82rem;
  color: var(--ink-light);
  letter-spacing: 1px;
}

/* accent bar per flower type */
.result-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 36px 36px 32px;
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
  animation: fadeUp 0.8s 0.2s ease both;
}
.result-card::before, .result-card::after {
  content: '';
  position: absolute;
  width: 16px; height: 16px;
  border-style: solid;
}
.result-card::before { top: 10px; left: 10px; border-width: 1px 0 0 1px; }
.result-card::after  { bottom: 10px; right: 10px; border-width: 0 1px 1px 0; }
.result-card.cascade::before,  .result-card.cascade::after  { border-color: rgba(64,78,59,0.3); }
.result-card.tulip::before,    .result-card.tulip::after    { border-color: rgba(123,150,105,0.3); }
.result-card.editorial::before,.result-card.editorial::after{ border-color: rgba(108,132,128,0.3); }
.result-card.poppy::before,    .result-card.poppy::after    { border-color: rgba(186,200,177,0.4); }
.result-card.wild::before,     .result-card.wild::after     { border-color: rgba(123,150,105,0.3); }
.result-card.rose::before,     .result-card.rose::after     { border-color: rgba(64,78,59,0.3); }
.result-card.market::before,   .result-card.market::after   { border-color: rgba(123,150,105,0.3); }

.result-accent-bar {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.cascade .result-accent-bar  { background: var(--ink); }
.tulip .result-accent-bar    { background: var(--sage); }
.editorial .result-accent-bar{ background: var(--grey-mid); }
.poppy .result-accent-bar    { background: var(--sage-light); }
.wild .result-accent-bar     { background: var(--sage); }
.rose .result-accent-bar     { background: var(--ink); }
.market .result-accent-bar   { background: var(--sage); }

.traits-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 20px;
}
.trait-tag {
  border: 1px solid var(--line);
  padding: 4px 12px; border-radius: 99px;
  font-size: 0.72rem; color: var(--ink-light);
  letter-spacing: 0.5px;
}

.result-desc {
  font-size: 0.9rem;
  color: var(--ink);
  line-height: 2;
  font-weight: 300;
  margin-bottom: 0;
}
.result-desc strong {
  font-weight: 500;
  color: var(--ink);
}

.result-detail-section {
  margin-top: 20px;
  border-top: 1px solid var(--line);
  padding-top: 20px;
}
.detail-row {
  display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px;
  font-size: 0.9rem; line-height: 2;
}
.detail-label {
  color: var(--ink-light);
  font-size: 0.72rem;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.detail-value { color: var(--ink); font-weight: 300; }

/* compatibility cards */
.compat-section {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 24px;
}
.compat-card {
  border-radius: 6px;
  padding: 20px 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.compat-card-good {
  background: rgba(123,150,105,0.08);
  border: 1px solid rgba(123,150,105,0.2);
}
.compat-card-hard {
  background: rgba(108,132,128,0.08);
  border: 1px solid rgba(108,132,128,0.2);
}
.compat-label {
  font-size: 0.68rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--ink-light);
}
.compat-card-good .compat-label { color: var(--sage); }
.compat-card-hard .compat-label { color: var(--grey-mid); }
.compat-flower-name {
  font-family: 'LXGW WenKai TC', cursive;
  font-size: 1rem;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.3;
}
.compat-flower-img {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 4px 0;
  overflow: hidden;
}
.compat-flower-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.compat-note {
  font-size: 0.75rem;
  color: var(--ink-light);
  line-height: 1.5;
  font-weight: 300;
}

.result-actions {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 20px; justify-content: center;
  animation: fadeUp 0.6s 0.5s ease both;
}
.btn-retry {
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  padding: 11px 20px;
  font-family: 'LXGW WenKai TC', cursive;
  font-size: 0.82rem; letter-spacing: 1.5px;
  cursor: pointer; border-radius: 2px;
  transition: all 0.2s;
}
.btn-retry:hover { background: var(--ink); color: var(--bg); }
.btn-save {
  background: transparent;
  border: 1px solid var(--ink);
  color: var(--ink);
  padding: 11px 20px;
  font-family: 'LXGW WenKai TC', cursive;
  font-size: 0.82rem; letter-spacing: 1.5px;
  cursor: pointer; border-radius: 2px;
  transition: all 0.2s;
}
.btn-save:hover { background: var(--ink); color: var(--bg); }
.btn-share {
  background: var(--sage);
  color: #fff;
  border: none;
  padding: 11px 20px;
  font-family: 'LXGW WenKai TC', cursive;
  font-size: 0.82rem; letter-spacing: 1.5px;
  cursor: pointer; border-radius: 2px;
  transition: all 0.2s;
}
.btn-share:hover { background: var(--ink); }

/* ── SHARE MODAL ── */
.share-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(30,26,21,0.5);
  z-index: 600;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.2s ease both;
}
.share-overlay.open { display: flex; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.share-sheet {
  background: var(--surface);
  border-radius: 16px 16px 0 0;
  padding: 28px 24px 40px;
  width: 100%; max-width: 600px;
  animation: slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1) both;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

.share-sheet-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem; font-weight: 400;
  color: var(--ink); text-align: center;
  margin-bottom: 24px;
}
.share-options {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 12px; margin-bottom: 20px;
}
.share-opt {
  display: flex; flex-direction: column;
  align-items: center; gap: 7px;
  background: none; border: none;
  cursor: pointer; padding: 8px 4px;
  border-radius: 8px;
  transition: background 0.2s;
}
.share-opt:hover { background: var(--line); }
.share-opt-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem;
  border: 1px solid var(--line);
  background: white;
}
.share-opt-label {
  font-size: 0.68rem; color: var(--ink-light);
  letter-spacing: 0.5px;
}
.share-cancel {
  display: block; width: 100%;
  background: var(--grey); border: 1px solid var(--line);
  border-radius: 8px; padding: 12px;
  font-family: 'LXGW WenKai TC', cursive;
  font-size: 0.85rem; color: var(--ink-light);
  cursor: pointer; transition: all 0.2s;
}
.share-cancel:hover { background: var(--sage-light); color: var(--ink); }

/* ── SAVE CARD ── */
/* 截圖用的卡片，螢幕上隱藏但 html2canvas 看得到 */
#save-card {
  position: fixed;
  left: -9999px; top: 0;
  width: 375px;
  background: var(--surface);
  padding: 40px 32px;
  font-family: 'LXGW WenKai TC', cursive;
  color: var(--ink);
}
.save-card-eyebrow {
  font-size: 0.65rem; letter-spacing: 3px;
  text-transform: uppercase; color: var(--ink-light);
  text-align: center; margin-bottom: 16px;
}
.save-card-icon {
  display: block;
  text-align: center; margin-bottom: 12px;
}
.save-card-icon img {
  width: 100px;
  height: 100px;
  object-fit: contain;
}
.save-card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.9rem; font-weight: 300;
  text-align: center; margin-bottom: 4px;
}
.save-card-tagline {
  font-size: 0.78rem; color: var(--ink-light);
  text-align: center; margin-bottom: 20px;
  letter-spacing: 0.5px;
}
.save-card-traits {
  display: flex; flex-wrap: wrap; gap: 5px;
  justify-content: center; margin-bottom: 18px;
}
.save-card-trait {
  border: 1px solid var(--line);
  padding: 3px 10px; border-radius: 99px;
  font-size: 0.68rem; color: var(--ink-light);
}
.save-card-desc {
  font-size: 0.82rem; line-height: 1.9;
  color: var(--ink); margin-bottom: 24px;
}
.save-card-detail {
  margin-bottom: 20px;
  border-top: 1px solid var(--line);
  padding-top: 16px;
}
.save-card-detail-row {
  margin-bottom: 12px;
}
.save-card-detail-label {
  display: block;
  font-size: 0.65rem;
  letter-spacing: 1.5px;
  color: var(--ink-light);
  margin-bottom: 2px;
}
.save-card-detail-value {
  font-size: 0.82rem;
  line-height: 1.8;
  color: var(--ink);
  font-weight: 300;
}
.save-card-footer {
  font-size: 0.65rem; color: var(--ink-light);
  text-align: center; letter-spacing: 1px;
  border-top: 1px solid var(--grey); padding-top: 14px;
}

/* ── RESULT ACTIONS (update) ── */
.result-actions {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 20px; justify-content: center;
  animation: fadeUp 0.6s 0.5s ease both;
}

/* ── AUDIO CONTROL ── */
.audio-btn {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(242,240,236,0.92);
  border: 1px solid var(--line);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  z-index: 500;
  backdrop-filter: blur(8px);
  transition: all 0.2s ease;
  box-shadow: 0 2px 12px rgba(64,78,59,0.1);
}
.audio-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px rgba(64,78,59,0.15); }
.audio-btn.muted { opacity: 0.45; }

/* volume fade animation */
@keyframes volumePulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

/* ── PETAL ── */
.petal { position:fixed; pointer-events:none; animation:petalFall linear forwards; z-index:200; font-size:1rem; }
@keyframes petalFall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(540deg);opacity:0} }

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

@media(max-width:480px) {
  .deco-line { display: none; }
  .question-card, .start-card { padding: 28px 20px; }
  .result-card { padding: 28px 20px; }
  .audio-btn { bottom: 16px; right: 16px; }
  .result-flower-icon img { width: 160px; height: 160px; }
  .detail-row { font-size: 0.85rem; line-height: 1.9; }
  .compat-section { grid-template-columns: 1fr 1fr; gap: 10px; }
  .compat-card { padding: 16px 12px; }
  .compat-flower-name { font-size: 0.88rem; }
  .compat-flower-img { width: 64px; height: 64px; }
  .compat-note { font-size: 0.7rem; }
}
</style>

let currentQ = 0;

let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// shuffle options order each time
let shuffledOpts = [];

function startQuiz() {
  currentQ = 0;
  scores = { cascade:0, tulip:0, editorial:0, poppy:0, wild:0, rose:0, market:0 };
  answered = false;
  shuffledOpts = QUESTIONS.map(q => shuffle(q.opts));

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.querySelector('.header').style.display = '';

  // GA4：測驗開始
  gtag('event', 'quiz_start', { event_category: 'quiz' });

  startBgm();
  renderQ();
}

function renderQ() {
  answered = false;
  const q = QUESTIONS[currentQ];
  const opts = shuffledOpts[currentQ];

  const n = String(currentQ+1).padStart(2,'0');
  document.getElementById('q-num').textContent = `${n} / 08`;
  document.getElementById('q-label').textContent = `Question ${n}`;
  document.getElementById('q-text').textContent = q.text;

  const pct = (currentQ / 8) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-dot').style.left = pct + '%';

  const grid = document.getElementById('opts');
  const labels = ['A','B','C','D'];
  grid.innerHTML = opts.map((o,i) => `
    <button class="opt-btn" onclick="pick(${i}, this)">
      <span class="opt-letter">${labels[i]}</span>
      <span class="opt-text">${o.text}</span>
    </button>
  `).join('');

  // re-animate card
  const card = document.getElementById('q-card');
  card.style.animation = 'none'; card.offsetHeight;
  card.style.animation = 'slideIn 0.45s ease both';
}

function pick(idx, btn) {
  if (answered) return;
  answered = true;

  const opt = shuffledOpts[currentQ][idx];
  Object.entries(opt.weights).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });

  document.querySelectorAll('.opt-btn').forEach(b => b.classList.add('disabled'));
  btn.classList.add('chosen');


  setTimeout(() => {
    // 先把選項容器清空，確保舊按鈕連同 chosen class 一起消滅
    document.getElementById('opts').innerHTML = '';
    currentQ++;
    if (currentQ < 8) renderQ();
    else showResult();
  }, 500);
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.querySelector('.header').style.display = 'none';

  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const f = FLOWERS[winner];

  document.getElementById('r-icon').innerHTML = `<img src="${f.icon}" alt="${f.name}">`;
  document.getElementById('r-name').textContent = f.name;
  document.getElementById('r-latin').textContent = f.latin;
  document.getElementById('r-tagline').textContent = f.tagline;

  document.getElementById('r-traits').innerHTML =
    f.traits.map(t => `<span class="trait-tag">${t}</span>`).join('');

  document.getElementById('r-desc').innerHTML =
    f.desc.replace(/\n/g,'<br>');

  document.getElementById('r-strength').textContent = f.strength;
  document.getElementById('r-blind').textContent = f.blind;

  const good = f.compat.find(c => c.type === 'good');
  const hard = f.compat.find(c => c.type === 'hard');
  if (good) {
    const gf = Object.values(FLOWERS).find(fl => fl.name === good.name);
    document.getElementById('r-compat-good-name').textContent = good.name;
    document.getElementById('r-compat-good-img').innerHTML = gf ? `<img src="${gf.icon}" alt="${good.name}">` : '';
    document.getElementById('r-compat-good-note').textContent = good.note;
  }
  if (hard) {
    const hf = Object.values(FLOWERS).find(fl => fl.name === hard.name);
    document.getElementById('r-compat-hard-name').textContent = hard.name;
    document.getElementById('r-compat-hard-img').innerHTML = hf ? `<img src="${hf.icon}" alt="${hard.name}">` : '';
    document.getElementById('r-compat-hard-note').textContent = hard.note;
  }

  const card = document.getElementById('r-card');
  card.className = `result-card ${winner}`;

  document.getElementById('result-screen').scrollIntoView({ behavior: 'smooth' });

  // GA4：測驗完成 + 結果花束
  gtag('event', 'quiz_complete', {
    event_category: 'quiz',
    result_bouquet: winner,           // e.g. 'cascade'
    result_name: f.name,              // e.g. '蝴蝶蘭瀑布花束'
  });


  spawnPetals();
}

function spawnPetals() {
  const icons = ['🍀','🌿','💐','🌷','🌼'];
  for (let i = 0; i < 14; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = icons[Math.floor(Math.random()*icons.length)];
      p.style.left = Math.random()*100+'vw';
      p.style.top = '-20px';
      p.style.fontSize = (0.7 + Math.random()*0.7)+'rem';
      p.style.animationDuration = (2+Math.random()*3)+'s';
      p.style.animationDelay = (Math.random()*1.5)+'s';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 6000);
    }, i * 90);
  }
}

let _shareText = '';
let _shareUrl  = '';

function openShare() {
  const name    = document.getElementById('r-name').textContent;
  const tagline = document.getElementById('r-tagline').textContent;
  _shareText = `💐 花束人格測驗\n我是「${name}」——${tagline}\n\n快來測看看你是哪種花束？`;
  _shareUrl  = window.location.href;

  // GA4
  gtag('event', 'share_open', { event_category: 'quiz', result_name: name });

  // 手機優先用原生分享
  if (navigator.share) {
    navigator.share({ title: '你是哪種花束？', text: _shareText, url: _shareUrl })
      .catch(() => {}); // 使用者取消不報錯
    return;
  }
  // 桌機 → 自訂 modal
  document.getElementById('share-overlay').classList.add('open');
}

function closeShare(e) {
  // 點 overlay 背景關閉，點 sheet 本身不關
  if (e && e.target !== document.getElementById('share-overlay')) return;
  document.getElementById('share-overlay').classList.remove('open');
}

function shareTo(platform) {
  const encoded = encodeURIComponent(_shareText + '\n' + _shareUrl);
  const urls = {
    line: `https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(_shareUrl)}&text=${encodeURIComponent(_shareText)}`,
    ig:   null, // IG 不支援網頁直接分享，改為複製後提示
    fb:   `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(_shareUrl)}&quote=${encodeURIComponent(_shareText)}`,
    copy: null,
  };

  if (platform === 'copy' || platform === 'ig') {
    navigator.clipboard.writeText(_shareText + '\n' + _shareUrl).then(() => {
      alert(platform === 'ig'
        ? '已複製！開啟 Instagram，貼到限動或貼文就好 🌸'
        : '連結已複製到剪貼簿！');
    });
  } else {
    window.open(urls[platform], '_blank', 'width=600,height=500');
  }

  gtag('event', 'share', { event_category: 'quiz', platform });
  document.getElementById('share-overlay').classList.remove('open');
}

async function saveCard() {
  const name    = document.getElementById('r-name').textContent;
  const tagline = document.getElementById('r-tagline').textContent;
  const icon    = document.getElementById('r-icon').innerHTML;
  const desc    = document.getElementById('r-desc').innerHTML;
  const traits  = document.getElementById('r-traits').innerHTML;

  // 填入 save-card
  document.getElementById('sc-icon').innerHTML       = icon;
  document.getElementById('sc-name').textContent    = name;
  document.getElementById('sc-tagline').textContent = tagline;
  document.getElementById('sc-traits').innerHTML    = traits
    .replace(/trait-tag/g, 'save-card-trait');
  document.getElementById('sc-desc').innerHTML      = desc;
  document.getElementById('sc-strength').textContent = document.getElementById('r-strength').textContent;
  document.getElementById('sc-blind').textContent    = document.getElementById('r-blind').textContent;

  // iOS Safari 會擋 async 後的 window.open，必須在 await 前同步開好
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  let newTab = null;
  if (isIOS) {
    newTab = window.open('about:blank');
  }

  // 暫時移到畫面內讓 html2canvas 拍得到
  const card = document.getElementById('save-card');
  card.style.left = '-375px'; // 螢幕外但不是 display:none

  try {
    const canvas = await html2canvas(card, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#faf7f2',
    });

    if (isIOS) {
      // iOS: 在預先開好的分頁中顯示圖片，使用者長按儲存
      const imgData = canvas.toDataURL('image/png');
      if (newTab) {
        newTab.document.write(
          `<html><head><title>花束人格_${name}</title><meta name="viewport" content="width=device-width,initial-scale=1"></head>` +
          `<body style="margin:0;display:flex;justify-content:center;background:#faf7f2">` +
          `<img src="${imgData}" style="width:100%;max-width:375px"></body></html>`
        );
        newTab.document.close();
      }
    } else {
      canvas.toBlob(function(blob) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.download = `花束人格_${name}.png`;
        link.href = url;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    gtag('event', 'save_card', { event_category: 'quiz', result_name: name });
  } catch(e) {
    if (newTab) newTab.close();
    alert('截圖失敗，請手動截圖儲存 🌸');
  }

  card.style.left = '-9999px';
}
const bgm      = document.getElementById('bgm');
const audioBtn = document.getElementById('audio-btn');

let isMuted = false;
let bgmStarted = false;

bgm.volume = 0.35;

function startBgm() {
  if (bgmStarted) return;
  bgmStarted = true;
  if (!isMuted) {
    bgm.play().catch(() => {
      // 瀏覽器 autoplay 政策：使用者互動後才能播，第一次點按鈕就會觸發
    });
  }
}

function toggleMute() {
  isMuted = !isMuted;
  bgm.muted = isMuted;
  audioBtn.textContent = isMuted ? '🔇' : '🎵';
  audioBtn.classList.toggle('muted', isMuted);

  // 如果取消靜音且 bgm 還沒開始，嘗試播放
  if (!isMuted && bgmStarted && bgm.paused) {
    bgm.play().catch(() => {});
  }
}
